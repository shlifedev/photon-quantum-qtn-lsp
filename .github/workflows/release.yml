name: Release

on:
  push:
    branches: [main]

# 연속 푸시 시 릴리스를 순차 실행해 태그 계산/생성 경쟁을 막는다.
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  version:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      should_release: ${{ steps.bump.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: bump
        run: |
          # 최신 v* 태그 찾기
          LATEST_TAG=$(git tag --sort=-version:refname | grep '^v' | head -1)

          if [ -z "$LATEST_TAG" ]; then
            NEW_VERSION="v1.0.0"
          else
            # patch 버전 추출 및 증가
            VERSION="${LATEST_TAG#v}"
            MAJOR=$(echo "$VERSION" | cut -d. -f1)
            MINOR=$(echo "$VERSION" | cut -d. -f2)
            PATCH=$(echo "$VERSION" | cut -d. -f3)
            PATCH=$((PATCH + 1))
            NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          fi

          # 이미 같은 태그가 있으면 skip
          if git rev-parse "$NEW_VERSION" >/dev/null 2>&1; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "Tag $NEW_VERSION already exists. Skipping release."
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "Will create release for $NEW_VERSION"
          fi

          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

  build:
    needs: version
    if: needs.version.outputs.should_release == 'true'
    uses: ./.github/workflows/build.yml
    with:
      version: ${{ needs.version.outputs.new_version }}
    secrets:
      JETBRAINS_CERTIFICATE_CHAIN: ${{ secrets.JETBRAINS_CERTIFICATE_CHAIN }}
      JETBRAINS_PRIVATE_KEY: ${{ secrets.JETBRAINS_PRIVATE_KEY }}
      JETBRAINS_PRIVATE_KEY_PASSWORD: ${{ secrets.JETBRAINS_PRIVATE_KEY_PASSWORD }}
      JETBRAINS_PUBLISH_TOKEN: ${{ secrets.JETBRAINS_PUBLISH_TOKEN }}

  release:
    needs: [version, build]
    if: needs.version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate changelog
        id: changelog
        env:
          NEW_VERSION: ${{ needs.version.outputs.new_version }}
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep '^v' | head -1)
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..HEAD"
          else
            RANGE="HEAD"
          fi

          {
            echo 'BODY<<CHANGELOG_EOF'
            echo "## What's Changed"
            echo ''
            git log "$RANGE" --pretty=format:'- %s (%h)' --no-merges 2>/dev/null || echo '- Initial release'
            echo ''
            echo ''
            echo '## Downloads'
            echo ''
            echo '| IDE | File |'
            echo '|-----|------|'
            echo "| VSCode | \`QtnLSP-vscode.vsix\` |"
            echo "| JetBrains Rider | \`QtnLSP-jetbrains.zip\` |"
            echo "| Visual Studio 2022 | \`QtnLSP-vs.vsix\` |"
            echo 'CHANGELOG_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: List artifacts
        run: find artifacts -type f

      - name: Create tag and release
        env:
          GH_TOKEN: ${{ github.token }}
          NEW_VERSION: ${{ needs.version.outputs.new_version }}
          BODY: ${{ steps.changelog.outputs.BODY }}
        run: |
          git tag "$NEW_VERSION"
          git push origin "$NEW_VERSION"

          gh release create "$NEW_VERSION" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$NEW_VERSION" \
            --notes "$BODY" \
            artifacts/QtnLSP-vscode.vsix \
            artifacts/QtnLSP-jetbrains.zip \
            artifacts/QtnLSP-vs.vsix
